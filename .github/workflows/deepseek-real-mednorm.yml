name: v0.1.1 real MedNorm DeepSeek evaluation

on:
  push:
    branches: [v0.1.1-deepseek-real]
    paths:
      - '.github/workflows/deepseek-real-mednorm.yml'
      - 'scripts/run_deepseek_mednorm_real.py'
      - 'scripts/publish_v011_results.py'
      - 'src/cohortcoder/deepseek_real_eval.py'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/deepseek-real-mednorm.yml'
      - 'scripts/run_deepseek_mednorm_real.py'
      - 'scripts/publish_v011_results.py'
      - 'src/cohortcoder/deepseek_real_eval.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  real-evaluation:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v0.1.1-deepseek-real
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Verify secret presence without printing it
        run: |
          python - <<'PY'
          import os
          if not os.environ.get('DEEPSEEK_API_KEY'):
              raise SystemExit('DEEPSEEK_API_KEY repository secret is not configured')
          print('DeepSeek secret is available')
          PY
      - name: Run real public MedNorm evaluation
        run: |
          python scripts/run_deepseek_mednorm_real.py \
            --output-dir /tmp/medcode-v011-real \
            --train-limit 3000 \
            --validation-limit 200 \
            --baseline-limit 500 \
            --deepseek-limit 24 \
            --top-k 5 \
            --target-auto-accuracy 0.95 \
            --model deepseek-v4-pro
      - name: Build publishable summary and grounded examples
        run: |
          python scripts/publish_v011_results.py \
            --run-dir /tmp/medcode-v011-real \
            --publish-dir results/v0.1.1 \
            --max-examples 8
      - name: Upload complete evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: medcode-v0.1.1-real-deepseek
          path: /tmp/medcode-v011-real
          retention-days: 30
      - name: Commit aggregate results and selected examples
        if: github.event_name != 'pull_request'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add results/v0.1.1
          if git diff --cached --quiet; then
            echo 'No result changes to commit'
          else
            git commit -m 'Add v0.1.1 real MedNorm DeepSeek results'
            git push origin HEAD:v0.1.1-deepseek-real
          fi
