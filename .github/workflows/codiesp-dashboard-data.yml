name: CodiEsp dashboard data

on:
  push:
    paths:
      - 'scripts/export_codiesp_test_texts.py'
      - '.github/workflows/codiesp-dashboard-data.yml'
  pull_request:
    paths:
      - 'scripts/export_codiesp_test_texts.py'
      - '.github/workflows/codiesp-dashboard-data.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-texts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install minimal dependency
        run: pip install pandas
      - name: Export CodiEsp English test texts
        run: |
          mkdir -p /tmp/codiesp_dashboard_data
          python scripts/export_codiesp_test_texts.py --output-dir /tmp/codiesp_dashboard_data
      - name: Verify
        run: |
          python - <<'PY'
          import pandas as pd
          p='/tmp/codiesp_dashboard_data/test_texts.csv'
          x=pd.read_csv(p)
          assert len(x)==250
          assert x['clinical_text'].str.len().gt(0).all()
          PY
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: codiesp-dashboard-data
          path: /tmp/codiesp_dashboard_data/
