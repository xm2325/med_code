name: CodiEsp direct DeepSeek thinking

on:
  push:
    paths:
      - 'scripts/run_codiesp_direct_deepseek_thinking.py'
      - '.github/workflows/codiesp-direct-deepseek-thinking.yml'
  pull_request:
    paths:
      - 'scripts/run_codiesp_direct_deepseek_thinking.py'
      - '.github/workflows/codiesp-direct-deepseek-thinking.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  direct-thinking:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install pandas
      - name: Run direct DeepSeek V4-Pro thinking benchmark
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p /tmp/codiesp_direct_thinking
          python scripts/run_codiesp_direct_deepseek_thinking.py \
            --output-dir /tmp/codiesp_direct_thinking \
            --dev-selection-n 40 \
            --test-n 250
      - name: Verify
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=json.loads(Path('/tmp/codiesp_direct_thinking/summary.json').read_text())
          assert p['no_retrieval_or_candidate_list'] is True
          assert p['test']['n_documents'] == 250
          assert 0 <= p['test']['metrics']['micro_f1'] <= 1
          PY
      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codiesp-direct-deepseek-thinking
          path: /tmp/codiesp_direct_thinking/
