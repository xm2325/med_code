# Validation for the first v0.2 candidate-generation milestone.
# The main-branch run persists machine-readable success/failure diagnostics under results/v0.2.
name: v0.2 candidate generation real evaluation

on:
  push:
    branches:
      - main
      - agent/v0.2-candidate-generation
    paths:
      - '.github/workflows/candidate-generation-v02.yml'
      - 'scripts/run_candidate_generation_v02.py'
      - 'src/cohortcoder/candidate_generation.py'
      - 'src/cohortcoder/mednorm.py'
      - 'tests/test_candidate_generation_v02.py'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/candidate-generation-v02.yml'
      - 'scripts/run_candidate_generation_v02.py'
      - 'src/cohortcoder/candidate_generation.py'
      - 'src/cohortcoder/mednorm.py'
      - 'tests/test_candidate_generation_v02.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  candidate-generation:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Focused candidate-generation tests
        id: focused_tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pytest -q tests/test_candidate_generation_v02.py 2>&1 | tee /tmp/v02-tests.log
      - name: Run fixed real MedNorm / CADEC-held-out comparison
        id: real_benchmark
        if: steps.focused_tests.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/run_candidate_generation_v02.py \
            --output-dir /tmp/medcode-v02-candidates \
            --train-limit 3000 \
            --validation-limit 200 \
            --test-limit 500 \
            --top-k 50 2>&1 | tee /tmp/v02-benchmark.log
      - name: Write metric summary
        if: steps.real_benchmark.outcome == 'success'
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          p = Path('/tmp/medcode-v02-candidates/candidate_generation_results.json')
          data = json.loads(p.read_text())
          b = data['baseline_v0_1_1_family']
          v = data['v0_2_alias_aware_hybrid']
          d = data['delta_v0_2_minus_baseline']
          lines = [
              '# v0.2 candidate generation — real held-out result',
              '',
              '| Metric | v0.1.1 family | v0.2 | delta |',
              '|---|---:|---:|---:|',
          ]
          for key, label in [
              ('accuracy_at_1', 'Accuracy@1'),
              ('recall_at_5', 'Recall@5'),
              ('recall_at_20', 'Recall@20'),
              ('recall_at_50', 'Recall@50'),
              ('mrr_at_50', 'MRR@50'),
          ]:
              delta_key = key + '_delta' if key != 'mrr_at_50' else 'mrr_at_50_delta'
              if key == 'accuracy_at_1': delta_key = 'accuracy_at_1_delta'
              lines.append(f"| {label} | {b[key]:.3f} | {v[key]:.3f} | {d[delta_key]:+.3f} |")
          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as handle:
              handle.write('\n'.join(lines) + '\n')
          PY
      - name: Upload complete v0.2 evaluation artifacts
        if: steps.real_benchmark.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: medcode-v0.2-candidate-generation
          path: /tmp/medcode-v02-candidates
          retention-days: 30
      - name: Persist observed results or diagnostics
        if: always() && github.event_name == 'push'
        env:
          TEST_OUTCOME: ${{ steps.focused_tests.outcome }}
          BENCHMARK_OUTCOME: ${{ steps.real_benchmark.outcome }}
          RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p results/v0.2
          python - <<'PY'
          import json, os
          from pathlib import Path
          out = Path('results/v0.2')
          payload = {
              'release': '0.2.0-candidate-generation',
              'workflow_run_id': os.environ.get('RUN_ID'),
              'focused_tests_outcome': os.environ.get('TEST_OUTCOME') or 'skipped',
              'real_benchmark_outcome': os.environ.get('BENCHMARK_OUTCOME') or 'skipped',
          }
          (out / 'execution_status.json').write_text(json.dumps(payload, indent=2), encoding='utf-8')
          for source, target in [
              ('/tmp/v02-tests.log', 'focused_tests.log'),
              ('/tmp/v02-benchmark.log', 'benchmark.log'),
          ]:
              p = Path(source)
              if p.exists():
                  lines = p.read_text(encoding='utf-8', errors='replace').splitlines()
                  (out / target).write_text('\n'.join(lines[-200:]) + '\n', encoding='utf-8')
          run = Path('/tmp/medcode-v02-candidates')
          if run.exists():
              for name in ['candidate_generation_results.json', 'model_selection.csv', 'candidate_failure_examples.jsonl']:
                  src = run / name
                  if src.exists():
                      (out / name).write_bytes(src.read_bytes())
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add results/v0.2
          if git diff --cached --quiet; then
            echo 'No v0.2 result/status changes to commit'
          else
            git commit -m 'Record v0.2 candidate-generation evaluation'
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
      - name: Enforce successful v0.2 validation
        if: always()
        env:
          TEST_OUTCOME: ${{ steps.focused_tests.outcome }}
          BENCHMARK_OUTCOME: ${{ steps.real_benchmark.outcome }}
        run: |
          test "${TEST_OUTCOME}" = "success"
          test "${BENCHMARK_OUTCOME}" = "success"
