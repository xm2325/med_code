name: v0.1.1 real DeepSeek smoke

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/deepseek-real-smoke.yml'
      - '.github/workflows/deepseek-real-mednorm.yml'

permissions:
  contents: read

jobs:
  deepseek-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Verify Actions secret
        run: |
          test -n "$DEEPSEEK_API_KEY"
          echo 'DEEPSEEK_API_KEY is available'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run small real MedNorm + DeepSeek evaluation
        run: |
          python scripts/run_deepseek_mednorm_real.py \
            --output-dir /tmp/medcode-v011-smoke \
            --train-limit 1200 \
            --validation-limit 80 \
            --baseline-limit 80 \
            --deepseek-limit 3 \
            --top-k 5 \
            --target-auto-accuracy 0.95 \
            --model deepseek-v4-pro
      - name: Upload smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: medcode-v0.1.1-real-deepseek-smoke
          path: /tmp/medcode-v011-smoke
          retention-days: 7
