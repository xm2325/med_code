name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'results/**'
  pull_request:
    paths-ignore:
      - 'results/**'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee /tmp/pytest.log
      - name: Package import smoke
        id: package_smoke
        if: steps.tests.outcome == 'success'
        continue-on-error: true
        run: >-
          python -c "import cohortcoder; from cohortcoder.realdata import run_real_benchmark;
          from cohortcoder.advanced import AdvancedSingleLabelCoder, AdvancedModelConfig;
          from cohortcoder.advanced_benchmark import run_advanced_singlelabel_benchmark;
          from cohortcoder.mimic_benchmark import run_mimic_icd10_benchmark;
          from cohortcoder.explanation_quality import apply_explanation_quality_gate;
          from cohortcoder.mipa_local_inference import InferenceConfig, generate_local_predictions;
          from cohortcoder.discordance import evaluate_three_way_discordance;
          print(cohortcoder.__version__)"
      - name: Demo smoke
        id: demo_smoke
        if: steps.tests.outcome == 'success' && steps.package_smoke.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            python scripts/run_demo.py
            python scripts/run_explainable_demo.py --output-dir /tmp/medcode_explainable_demo
            python scripts/run_multilabel_synthetic_demo.py
          } 2>&1 | tee /tmp/demo-smoke.log
      - name: Persist CI diagnostics
        if: always() && github.event_name == 'push' && github.ref_name == 'main'
        env:
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          PACKAGE_OUTCOME: ${{ steps.package_smoke.outcome }}
          DEMO_OUTCOME: ${{ steps.demo_smoke.outcome }}
          RUN_ID: ${{ github.run_id }}
        run: |
          mkdir -p results/ci
          python - <<'PY'
          import json, os
          from pathlib import Path
          out = Path('results/ci')
          payload = {
              'workflow_run_id': os.environ.get('RUN_ID'),
              'tests_outcome': os.environ.get('TESTS_OUTCOME') or 'skipped',
              'package_smoke_outcome': os.environ.get('PACKAGE_OUTCOME') or 'skipped',
              'demo_smoke_outcome': os.environ.get('DEMO_OUTCOME') or 'skipped',
          }
          (out / 'latest_status.json').write_text(json.dumps(payload, indent=2), encoding='utf-8')
          for source, target in [('/tmp/pytest.log', 'pytest.log'), ('/tmp/demo-smoke.log', 'demo-smoke.log')]:
              p = Path(source)
              if p.exists():
                  (out / target).write_text(p.read_text(encoding='utf-8', errors='replace'), encoding='utf-8')
          PY