name: CodiEsp ICD10 benchmark

on:
  push:
    paths:
      - 'scripts/run_codiesp_icd10_benchmark.py'
      - '.github/workflows/codiesp-icd10-benchmark.yml'
  pull_request:
    paths:
      - 'scripts/run_codiesp_icd10_benchmark.py'
      - '.github/workflows/codiesp-icd10-benchmark.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codiesp:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run CodiEsp English ICD-10 benchmark
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p /tmp/codiesp_icd10
          python scripts/run_codiesp_icd10_benchmark.py \
            --output-dir /tmp/codiesp_icd10 \
            --deepseek-n 50
      - name: Verify benchmark
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=json.loads(Path('/tmp/codiesp_icd10/summary.json').read_text())
          assert p['n_train'] >= 400
          assert p['n_dev'] >= 200
          assert p['n_test'] >= 200
          assert 0 <= p['tfidf_retrieval_baseline']['micro_f1'] <= 1
          PY
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codiesp-icd10-benchmark
          path: /tmp/codiesp_icd10/
