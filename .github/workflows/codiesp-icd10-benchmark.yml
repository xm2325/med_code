name: CodiEsp ICD10 benchmark (legacy/manual)

on:
  workflow_dispatch:
    inputs:
      confirm_paid_run:
        description: 'I confirm this legacy benchmark may call the paid DeepSeek API.'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  codiesp:
    if: ${{ inputs.confirm_paid_run == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Require configured DeepSeek API key
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo 'DEEPSEEK_API_KEY is not configured. No paid LLM requests were started.' >&2
            exit 1
          fi
      - name: Run CodiEsp English ICD-10 benchmark
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          mkdir -p /tmp/codiesp_icd10
          python scripts/run_codiesp_icd10_benchmark.py \
            --output-dir /tmp/codiesp_icd10 \
            --deepseek-n 50
      - name: Export English test clinical texts for case-level audit
        run: |
          python scripts/export_codiesp_test_texts.py \
            --output-dir /tmp/codiesp_icd10
      - name: Verify benchmark
        run: |
          python - <<'PY'
          import json
          import pandas as pd
          from pathlib import Path
          p=json.loads(Path('/tmp/codiesp_icd10/summary.json').read_text())
          assert p['n_train'] >= 400
          assert p['n_dev'] >= 200
          assert p['n_test'] >= 200
          assert 0 <= p['tfidf_retrieval_baseline']['micro_f1'] <= 1
          t=pd.read_csv('/tmp/codiesp_icd10/test_texts.csv')
          assert len(t) == 250
          assert t['clinical_text'].str.len().gt(0).all()
          PY
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codiesp-icd10-benchmark
          path: /tmp/codiesp_icd10/
