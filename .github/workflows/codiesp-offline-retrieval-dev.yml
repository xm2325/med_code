name: CodiEsp offline retrieval DEV

on:
  push:
    branches:
      - mipa-public-pilot-v03
    paths:
      - .github/offline-retrieval-dev-trigger
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codiesp-offline-retrieval-dev
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DEEPSEEK_API_KEY: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas scipy scikit-learn

      - name: Verify no LLM secret is available
        shell: bash
        run: |
          test -z "${DEEPSEEK_API_KEY:-}"
          echo "DEEPSEEK_API_KEY is empty; this workflow is retrieval-only."

      - name: Run full CodiEsp DEV retrieval benchmark
        run: |
          python scripts/run_codiesp_offline_retrieval_benchmark.py \
            --split dev \
            --output-dir results/codiesp_offline_retrieval/dev_v02

      - name: Print retrieval summary
        if: always()
        run: |
          if [ -f results/codiesp_offline_retrieval/dev_v02/retrieval_summary.csv ]; then
            cat results/codiesp_offline_retrieval/dev_v02/retrieval_summary.csv
          fi
          if [ -f results/codiesp_offline_retrieval/dev_v02/retrieval_manifest.json ]; then
            cat results/codiesp_offline_retrieval/dev_v02/retrieval_manifest.json
          fi

      - name: Upload offline retrieval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codiesp-offline-retrieval-dev-v02-${{ github.run_id }}
          path: results/codiesp_offline_retrieval/dev_v02/
          if-no-files-found: warn
          retention-days: 30
