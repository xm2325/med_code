name: CodiEsp offline retrieval DEV

on:
  push:
    branches:
      - mipa-public-pilot-v03
    paths:
      - .github/offline-retrieval-dev-trigger
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codiesp-offline-retrieval-dev
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DEEPSEEK_API_KEY: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas scipy scikit-learn

      - name: Verify no LLM secret is available
        shell: bash
        run: |
          test -z "${DEEPSEEK_API_KEY:-}"
          echo "DEEPSEEK_API_KEY is empty; this workflow is retrieval-only."

      - name: Run full CodiEsp DEV retrieval benchmark
        shell: bash
        run: |
          set -o pipefail
          OUT=results/codiesp_offline_retrieval/dev_v03_fast
          mkdir -p "$OUT"
          python scripts/run_codiesp_offline_retrieval_benchmark_fast.py \
            --split dev \
            --candidate-n 1500 \
            --lsa-dim 64 \
            --output-dir "$OUT" \
            2>&1 | tee "$OUT/benchmark.log"

      - name: Print retrieval summary
        if: always()
        run: |
          OUT=results/codiesp_offline_retrieval/dev_v03_fast
          if [ -f "$OUT/retrieval_summary.csv" ]; then
            cat "$OUT/retrieval_summary.csv"
          elif [ -f "$OUT/retrieval_summary_partial.csv" ]; then
            cat "$OUT/retrieval_summary_partial.csv"
          fi
          if [ -f "$OUT/retrieval_manifest.json" ]; then
            cat "$OUT/retrieval_manifest.json"
          fi

      - name: Upload offline retrieval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codiesp-offline-retrieval-dev-v03-fast-${{ github.run_id }}
          path: results/codiesp_offline_retrieval/dev_v03_fast/
          if-no-files-found: warn
          retention-days: 30

      - name: Persist benchmark outputs to branch
        if: always()
        shell: bash
        run: |
          OUT=results/codiesp_offline_retrieval/dev_v03_fast
          if [ ! -d "$OUT" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "$OUT/"
          if git diff --cached --quiet; then
            echo "No new benchmark outputs to commit."
            exit 0
          fi
          git commit -m "Store CodiEsp DEV offline retrieval results v0.3 [skip ci]"
          git push origin HEAD:mipa-public-pilot-v03
